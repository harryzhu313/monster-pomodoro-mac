<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Love Monster</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <style>
    /* 7 天连击庆祝全屏层,平移旧 content/celebration.js 的内嵌样式。
       全应用唯一的"丰富"动效时刻(DESIGN Motion 节)。 */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { background: transparent; height: 100%; }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        var(--celebration-inner) 0%, var(--celebration-outer) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      color: #fff;
      animation: fadeIn 0.4s ease-out;
      overflow: hidden;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .overlay.is-leaving { animation: fadeOut 0.45s ease-in forwards; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

    .banner {
      font-size: 15px;
      letter-spacing: 6px;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px var(--celebration-shadow);
    }

    .title {
      font-size: 44px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 2px;
      text-shadow: 0 2px 14px var(--celebration-shadow);
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 32px;
      letter-spacing: 1px;
    }

    .monster-stage {
      width: min(62vh, 60vw);
      height: min(62vh, 60vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .monster {
      width: 100%;
      height: 100%;
      animation: pulse 1.1s ease-in-out infinite alternate;
      filter: drop-shadow(0 18px 36px var(--celebration-shadow));
    }

    @keyframes pulse {
      0%   { transform: scale(1) rotate(-2deg); }
      100% { transform: scale(1.06) rotate(2deg); }
    }

    .hint {
      margin-top: 28px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.75);
    }

    .hearts { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

    .heart {
      position: absolute;
      bottom: -60px;
      color: #fff;
      animation: float linear infinite;
      will-change: transform, opacity;
    }

    @keyframes float {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .monster, .heart { animation: none; }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="hearts" id="hearts"></div>
    <div class="banner">ACHIEVEMENT UNLOCKED</div>
    <div class="title">🏅 Love Monster 出现了</div>
    <div class="subtitle">第 7 天的第一个番茄完成了。现在去休息。</div>
    <div class="monster-stage">
      <img class="monster" src="../shared/monsters/love.svg" alt="love monster" />
    </div>
    <div class="hint">点击任意处关闭 · 10 秒后自动消失</div>
  </div>
  <script type="module" src="celebration.js"></script>
</body>
</html>
