<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Tomato Monster</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <main class="container">
    <section class="card timer-card">
      <img id="monster" class="monster" alt="" />
      <div class="phase-label" id="phase-label">准备开始</div>
      <div class="break-subtitle is-hidden" id="break-subtitle"></div>
      <div class="timer" id="timer">25:00</div>
      <div class="buttons">
        <button id="btn-primary" class="btn btn-primary">开始专注</button>
        <div class="buttons-row">
          <button id="btn-abandon" class="btn btn-secondary" disabled
                  title="放弃本次专注,记一颗烂番茄">放弃</button>
          <button id="btn-reset" class="btn btn-secondary">重置</button>
        </div>
      </div>
      <div class="extend is-hidden" id="extend">
        <div class="extend-title" id="ext-title">还没做完？用一次配额再专注一会</div>
        <div class="extend-options" id="ext-options">
          <button class="ext-btn" data-min="5">+5 分钟</button>
          <button class="ext-btn" data-min="25">+25 分钟 · 1 🍅</button>
          <button class="ext-btn" id="ext-custom-btn">自定义</button>
        </div>
        <div class="extend-custom is-hidden" id="ext-custom">
          <input type="number" id="ext-input" min="0.1" max="120" step="any"
                 placeholder="分钟(可小数)" aria-label="自定义加时分钟数" />
          <button class="ext-btn primary" id="ext-confirm">确认</button>
          <button class="ext-btn ghost" id="ext-cancel">取消</button>
        </div>
        <div class="extend-note" id="ext-note"></div>
      </div>
      <div class="quota" id="quota" title="双击重置今日配额(仅测试)">今日剩 3/3</div>
    </section>

    <section class="card harvest-card">
      <div class="harvest-label">今日收获</div>
      <div class="harvest-icons" id="harvest-icons"></div>
      <div class="streak" id="streak">🔥 已连续 0 天</div>
    </section>

    <section class="card tasks-card">
      <header class="tasks-header">
        <span class="tasks-title">今日任务</span>
        <span class="tasks-count badge" id="tasks-count">0 个完成</span>
      </header>

      <form class="task-add" id="task-add-form">
        <input type="text" id="task-input" class="task-input"
               placeholder="比如:内参阅读" maxlength="40" autocomplete="off" />
        <select id="task-category" class="task-category-select" title="分类" aria-label="任务分类">
          <option value="工作">工作</option>
          <option value="学习">学习</option>
          <option value="生活">生活</option>
          <option value="兴趣爱好">兴趣爱好</option>
        </select>
        <input type="number" id="task-planned" class="task-planned-input"
               min="1" max="20" value="1" title="计划番茄数" aria-label="计划番茄数" />
        <button type="submit" class="btn btn-primary btn-sm">添加</button>
      </form>

      <ul class="task-list" id="task-list"></ul>
      <div class="task-empty" id="task-empty">还没有任务,先加一个吧。</div>
    </section>

    <div class="footer-row">
      <button id="btn-stats" class="btn-ghost">统计与设置</button>
    </div>
    <div class="hint" id="hint">按时停下来,比多做一轮重要。</div>

    <!-- 首次启动引导(CONTENT.md"首次启动引导"节文案,通知权限步骤已按决策移除) -->
    <div class="onboarding is-hidden" id="onboarding">
      <img class="ob-monster" src="../shared/monsters/happy.svg" alt="" />
      <div class="ob-step" id="ob-step-1">
        <h2>从 Chrome 插件搬家?<br>先把旧数据接回来。</h2>
        <div class="ob-actions">
          <button class="btn btn-primary" id="ob-import">导入备份文件</button>
          <button class="btn btn-secondary" id="ob-fresh">我是新用户,直接开始</button>
        </div>
        <div class="ob-note" id="ob-note"></div>
        <input type="file" id="ob-file" accept="application/json" hidden />
      </div>
      <div class="ob-step is-hidden" id="ob-step-2">
        <h2>要不要开机自动启动?</h2>
        <p>番茄钟常驻菜单栏才不会被忘记。</p>
        <div class="ob-actions">
          <button class="btn btn-primary" id="ob-autostart-yes">开启</button>
          <button class="btn btn-secondary" id="ob-autostart-no">暂不</button>
        </div>
      </div>
      <div class="ob-step is-hidden" id="ob-step-3">
        <h2>随时按 ⌃⌥P 开始或暂停专注</h2>
        <p>不用找鼠标。可在设置里修改。</p>
        <div class="ob-actions">
          <button class="btn btn-primary" id="ob-done">开始使用</button>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="panel.js"></script>
</body>
</html>
